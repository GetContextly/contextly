name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check shared
        run: npx tsc --noEmit -p packages/shared/tsconfig.json

      - name: Type-check CLI
        run: npx tsc --noEmit -p packages/cli/tsconfig.json

      - name: Type-check MCP server
        run: npx tsc --noEmit -p packages/mcp-server/tsconfig.json

      - name: Run tests
        run: npx vitest run

      - name: Build shared
        run: npm run build:shared

      - name: Build CLI
        run: npm run build:cli

      - name: Build MCP server
        run: npm run build:mcp

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint shared
        run: npx eslint packages/shared/src --ext .ts,.tsx || true

      - name: Lint CLI
        run: npx eslint packages/cli/src --ext .ts || true

      - name: Lint MCP server
        run: npx eslint packages/mcp-server/src --ext .ts || true
