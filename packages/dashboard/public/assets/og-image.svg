<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="og-green-glow" cx="50%" cy="90%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="rgba(52,255,179,0.22)"/>
      <stop offset="100%" stop-color="rgba(52,255,179,0)"/>
    </radialGradient>
    <radialGradient id="og-violet-glow" cx="85%" cy="10%" r="35%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="rgba(124,140,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(124,140,255,0)"/>
    </radialGradient>
    <pattern id="og-grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
      <path d="M 60 0 L 60 60 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
    <clipPath id="terminal-clip">
      <rect x="640" y="100" width="510" height="320" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0B0F"/>
  <rect width="1200" height="630" fill="url(#og-grid)"/>
  <rect width="1200" height="630" fill="url(#og-green-glow)"/>
  <rect width="1200" height="630" fill="url(#og-violet-glow)"/>

  <!-- Left: Logotype + copy -->
  <!-- Wordmark -->
  <text x="72" y="230" font-family="Inter, -apple-system, sans-serif" font-size="72"
        font-weight="700" fill="white" letter-spacing="-2">Contextly</text>
  <!-- Green accent underline -->
  <rect x="72" y="244" width="220" height="3" rx="1.5" fill="#34FFB3" opacity="0.85"/>

  <!-- Subtitle -->
  <text x="72" y="306" font-family="Inter, -apple-system, sans-serif" font-size="28"
        font-weight="400" fill="rgba(255,255,255,0.6)">Persistent project memory for every</text>
  <text x="72" y="344" font-family="Inter, -apple-system, sans-serif" font-size="28"
        font-weight="400" fill="rgba(255,255,255,0.6)">AI coding agent.</text>

  <!-- Early Access badge -->
  <rect x="72" y="388" width="138" height="36" rx="18" fill="rgba(52,255,179,0.12)"
        stroke="rgba(52,255,179,0.35)" stroke-width="1"/>
  <circle cx="97" cy="406" r="4" fill="#34FFB3"/>
  <text x="110" y="411" font-family="Inter, -apple-system, sans-serif" font-size="13"
        font-weight="500" fill="#34FFB3">Early Access</text>

  <!-- Right: Terminal window mockup -->
  <!-- Terminal outer frame -->
  <rect x="640" y="100" width="510" height="320" rx="10" ry="10"
        fill="#12141C" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Terminal header bar -->
  <rect x="640" y="100" width="510" height="38" rx="10" ry="10"
        fill="rgba(255,255,255,0.04)"/>
  <rect x="640" y="124" width="510" height="14" fill="rgba(255,255,255,0.04)"/>

  <!-- Traffic-light dots -->
  <circle cx="667" cy="119" r="6" fill="#FF5F57"/>
  <circle cx="687" cy="119" r="6" fill="#FFBD2E"/>
  <circle cx="707" cy="119" r="6" fill="#28C840"/>

  <!-- Terminal title -->
  <text x="895" y="124" font-family="monospace, 'JetBrains Mono', Consolas" font-size="12"
        fill="rgba(255,255,255,0.35)" text-anchor="middle">contextly — memory sync</text>

  <!-- Terminal body: code lines -->
  <!-- Line 1: prompt -->
  <text x="668" y="176" font-family="monospace, 'JetBrains Mono', Consolas" font-size="13"
        fill="#34FFB3">$</text>
  <text x="682" y="176" font-family="monospace, 'JetBrains Mono', Consolas" font-size="13"
        fill="rgba(255,255,255,0.75)"> contextly sync</text>

  <!-- Line 2 -->
  <text x="668" y="204" font-family="monospace, 'JetBrains Mono', Consolas" font-size="13"
        fill="rgba(255,255,255,0.35)">  Syncing project context...</text>

  <!-- Line 3 -->
  <text x="668" y="228" font-family="monospace, 'JetBrains Mono', Consolas" font-size="13"
        fill="rgba(255,255,255,0.35)">  Reading</text>
  <text x="734" y="228" font-family="monospace, 'JetBrains Mono', Consolas" font-size="13"
        fill="rgba(124,140,255,0.8)">packages/cli/src/index.ts</text>

  <!-- Line 4 -->
  <text x="668" y="252" font-family="monospace, 'JetBrains Mono', Consolas" font-size="13"
        fill="rgba(255,255,255,0.35)">  Reading</text>
  <text x="734" y="252" font-family="monospace, 'JetBrains Mono', Consolas" font-size="13"
        fill="rgba(124,140,255,0.8)">docs/ARCHITECTURE.md</text>

  <!-- Line 5 -->
  <text x="668" y="276" font-family="monospace, 'JetBrains Mono', Consolas" font-size="13"
        fill="rgba(255,255,255,0.35)">  Detected 3 changed files</text>

  <!-- Line 6: success -->
  <text x="668" y="304" font-family="monospace, 'JetBrains Mono', Consolas" font-size="13"
        fill="#34FFB3">  ✓ Memory updated. 4 agents notified.</text>

  <!-- Line 7: cursor -->
  <text x="668" y="330" font-family="monospace, 'JetBrains Mono', Consolas" font-size="13"
        fill="#34FFB3">$</text>
  <rect x="682" y="316" width="8" height="16" rx="1" fill="rgba(52,255,179,0.6)">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom subtle tagline -->
  <text x="600" y="570" font-family="Inter, -apple-system, sans-serif" font-size="15"
        font-weight="400" fill="rgba(255,255,255,0.2)" text-anchor="middle"
        letter-spacing="0.5">contextly.dev</text>
</svg>
