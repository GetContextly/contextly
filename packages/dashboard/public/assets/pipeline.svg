<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <style>
      @keyframes dash-flow {
        to { stroke-dashoffset: -28; }
      }
      .flow-path {
        animation: dash-flow 2s linear infinite;
      }
    </style>
  </defs>

  <!-- Node 1: Git -->
  <rect x="20" y="20" width="130" height="80" rx="8" ry="8"
        fill="#12141C" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Git icon: branch dot cluster -->
  <circle cx="55" cy="52" r="5" fill="rgba(52,255,179,0.7)"/>
  <circle cx="55" cy="72" r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="75" cy="42" r="4" fill="rgba(255,255,255,0.25)"/>
  <line x1="55" y1="57" x2="55" y2="68" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="55" y1="52" x2="75" y2="46" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Git label -->
  <text x="105" y="65" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Git</text>

  <!-- Connector 1: Git → Contextly -->
  <path d="M 150 60 L 230 60"
        fill="none" stroke="#34FFB3" stroke-width="1.5"
        stroke-dasharray="4 3" stroke-dashoffset="0"
        class="flow-path"/>
  <!-- Arrowhead -->
  <polygon points="230,55 240,60 230,65" fill="#34FFB3" opacity="0.7"/>

  <!-- Node 2: Contextly (centered) -->
  <rect x="240" y="20" width="120" height="80" rx="8" ry="8"
        fill="#12141C" stroke="rgba(52,255,179,0.25)" stroke-width="1"/>
  <!-- Contextly icon: stacked memory lines -->
  <rect x="261" y="42" width="28" height="4" rx="2" fill="rgba(52,255,179,0.6)"/>
  <rect x="261" y="52" width="22" height="4" rx="2" fill="rgba(52,255,179,0.35)"/>
  <rect x="261" y="62" width="18" height="4" rx="2" fill="rgba(52,255,179,0.18)"/>
  <!-- Contextly label -->
  <text x="300" y="84" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Contextly</text>

  <!-- Connector 2: Contextly → AI Agents -->
  <path d="M 360 60 L 440 60"
        fill="none" stroke="#34FFB3" stroke-width="1.5"
        stroke-dasharray="4 3" stroke-dashoffset="0"
        class="flow-path"/>
  <!-- Arrowhead -->
  <polygon points="440,55 450,60 440,65" fill="#34FFB3" opacity="0.7"/>

  <!-- Node 3: AI Agents -->
  <rect x="450" y="20" width="130" height="80" rx="8" ry="8"
        fill="#12141C" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- AI icon: circuit-style dots -->
  <circle cx="487" cy="50" r="4" fill="rgba(124,140,255,0.7)"/>
  <circle cx="503" cy="65" r="4" fill="rgba(124,140,255,0.7)"/>
  <circle cx="519" cy="50" r="4" fill="rgba(124,140,255,0.7)"/>
  <line x1="491" y1="50" x2="499" y2="65" stroke="rgba(124,140,255,0.3)" stroke-width="1.5"/>
  <line x1="507" y1="65" x2="515" y2="50" stroke="rgba(124,140,255,0.3)" stroke-width="1.5"/>
  <line x1="491" y1="50" x2="515" y2="50" stroke="rgba(124,140,255,0.3)" stroke-width="1.5"/>
  <!-- AI Agents label -->
  <text x="537" y="65" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">AI Agents</text>
</svg>
